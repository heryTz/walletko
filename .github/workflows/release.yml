name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel: a cancelled run can abort a release mid-flight. Queue instead.
  cancel-in-progress: false

jobs:
  # Duplicated from ci.yml on purpose. ci.yml tests the PR's merge result; this
  # tests what actually landed on main, and is what gates the tag below. Keep
  # the two step lists in sync — if you add a step here, add it there too.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before tests: `pnpm test` is vitest only and never runs vite /
      # esbuild, so without this a broken build would only surface in `publish`
      # — i.e. after the tag and Release already exist.
      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    # needs: [test] is load-bearing, not sequencing preference. release-please
    # tags and cuts the Release itself; anything that runs after it cannot stop
    # a release, only strand one (tag + Release exist, no image, :latest stale).
    needs: [test]
    permissions:
      contents: write
      # issues: write is NOT unused. release-please labels its release PR
      # (autorelease: pending) to find it again on later runs, and PR labels go
      # through the issues API. Removing it makes releases silently stop.
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish release images
    runs-on: ubuntu-latest
    needs: [release-please]
    # result == 'success' guards the case where test failed, which skips
    # release-please. Do not reduce this to the release_created check alone: a
    # skipped job leaves release_created empty, and '' != 'true' is true.
    if: needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          # Check out the tag, not github.sha. With cancel-in-progress: false,
          # GitHub cancels a pending run when a newer one queues; the surviving
          # run's HEAD can then be a later commit than the one being released.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Resolve release date
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push walletko
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/walletko/Dockerfile
          target: runner
          push: true
          tags: |
            herytz/walletko:${{ needs.release-please.outputs.version }}
            herytz/walletko:latest
          build-args: |
            APP_VERSION=${{ needs.release-please.outputs.version }}
            APP_RELEASE_DATE=${{ steps.meta.outputs.date }}

      - name: Build and push finance-to-walletko
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/finance-to-walletko/Dockerfile
          target: runner
          push: true
          tags: |
            herytz/finance-to-walletko:${{ needs.release-please.outputs.version }}
            herytz/finance-to-walletko:latest

  snapshot:
    name: Publish snapshot image
    runs-on: ubuntu-latest
    needs: [release-please]
    # See publish's guard above — same reasoning: without result == 'success', a
    # failed test job would let this push :main from a red commit.
    if: needs.release-please.result == 'success' && needs.release-please.outputs.release_created != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Resolve snapshot metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push walletko snapshot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/walletko/Dockerfile
          target: runner
          push: true
          tags: |
            herytz/walletko:main
            herytz/walletko:main-${{ steps.meta.outputs.sha }}
          build-args: |
            APP_VERSION=main-${{ steps.meta.outputs.sha }}
            APP_RELEASE_DATE=${{ steps.meta.outputs.date }}
