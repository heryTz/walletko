name: Snapshot

on:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  snapshot:
    name: Publish dev image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Resolve snapshot metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push walletko snapshot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/walletko/Dockerfile
          target: runner
          push: true
          tags: |
            herytz/walletko:dev
            herytz/walletko:dev-${{ steps.meta.outputs.sha }}
          build-args: |
            APP_VERSION=dev-${{ steps.meta.outputs.sha }}
            APP_RELEASE_DATE=${{ steps.meta.outputs.date }}
