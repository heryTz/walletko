name: Build finance-to-walletko

on: workflow_dispatch

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Resolve short sha
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # context: . is load-bearing. The Dockerfile runs pnpm install --filter
      # finance-to-walletko..., which needs the workspace root lockfile.
      - name: Build and push finance-to-walletko
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/finance-to-walletko/Dockerfile
          target: runner
          push: true
          tags: |
            herytz/finance-to-walletko:latest
            herytz/finance-to-walletko:${{ steps.meta.outputs.sha }}
